  function attachPhotoHandlers(){document.querySelectorAll('[data-photo-field]').forEach(function(el){el.addEventListener('input',function(e){var i=parseInt(e.target.dataset.photoIndex,10),f=e.target.dataset.photoField;if(state.form.reconstructionPhotos[i])state.form.reconstructionPhotos[i][f]=e.target.value})});document.querySelectorAll('[data-photo-remove]').forEach(function(btn){btn.addEventListener('click',function(){var i=parseInt(btn.dataset.photoRemove,10);state.form.reconstructionPhotos.splice(i,1);refreshPhotos()})})}
  function refreshPhotos(){var c=document.getElementById('photos-container');if(c){c.innerHTML=buildPhotoSection();attachPhotoHandlers();var ap=document.getElementById('btn-add-photo');if(ap)ap.addEventListener('click',function(){if(!state.form.reconstructionPhotos)state.form.reconstructionPhotos=[];state.form.reconstructionPhotos.push({desc:'',url:''});refreshPhotos()})}}
  function saveRecord(){var f=state.form,req=['type','incidentDate','incidentTime','location','department','reporter','shortDesc','longDesc','shift','responsible','deadline','status'];if(f.type==='nearmiss')req.push('hazardType','riskLevel','potentialOutcome','correctiveAction');if(f.type==='accident')req.push('accidentType','injuryLevel','accidentCause','preventiveActions');var m=req.filter(function(k){return!f[k]});if(m.length){showAlert('LĂĽtfen zorunlu (*) alanlarÄ± doldurun.','error');return}if(!f.incidentNo)f.incidentNo=nextNo();var ei=state.records.findIndex(function(r){return r.incidentNo===f.incidentNo});if(ei>=0)state.records[ei]=JSON.parse(JSON.stringify(f));else state.records.unshift(JSON.parse(JSON.stringify(f)));saveLS(STORAGE_KEY,state.records);var we=state.editingId;showAlert('KayÄ±t baĹźarÄ±yla '+(we?'gĂĽncellendi':'oluĹźturuldu')+': '+f.incidentNo,'success');state.form=newEmptyForm();state.editingId=null;state.view='list';render()}
  function handleRowAction(a,id){var rec=state.records.find(function(r){return r.incidentNo===id});if(!rec)return;if(a==='view'){document.getElementById('detail-panel').innerHTML=renderDetail(rec);document.getElementById('btn-close-detail').addEventListener('click',function(){document.getElementById('detail-panel').innerHTML=''});document.getElementById('detail-panel').scrollIntoView({behavior:'smooth',block:'start'})}else if(a==='edit'){state.form=JSON.parse(JSON.stringify(rec));if(!Array.isArray(state.form.bodyParts))state.form.bodyParts=rec.bodyPart?[rec.bodyPart]:[];if(!Array.isArray(state.form.reconstructionPhotos))state.form.reconstructionPhotos=[];state.editingId=id;state.view='new';render()}else if(a==='delete'){if(!confirm(id+' numaralÄ± kayÄ±t silinsin mi?'))return;state.records=state.records.filter(function(r){return r.incidentNo!==id});saveLS(STORAGE_KEY,state.records);showAlert('KayÄ±t silindi.','info');render()}}
  function exportJson(){var d=JSON.stringify(state.records,null,2),b=new Blob([d],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='isg-kayitlari-'+todayStr()+'.json';a.click();setTimeout(function(){URL.revokeObjectURL(u)},1000)}
  document.querySelectorAll('#nav button').forEach(function(b){b.addEventListener('click',function(){state.view=b.dataset.view;render()})});
  render();
})();
</script>
